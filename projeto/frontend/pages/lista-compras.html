    <div class="sidebar-user"><div class="user-avatar" id="sidebarAvatar">?</div><div class="user-info"><div class="user-name" id="sidebarName">...</div><div class="user-role">Membro</div></div></div>
    <!-- estrutura principal da tela -->
    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
    <!-- estrutura principal da tela -->
      <a href="dashboard.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="receitas.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Receitas</a>
      <a href="despensa.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Despensa</a>
      <a href="lista-compras.html" class="nav-item active"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Lista de Compras</a>
      <div class="nav-section-title">Pessoal</div>
    <!-- estrutura principal da tela -->
      <a href="favoritos.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Favoritos</a>
      <a href="historico.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Histórico</a>
      <a href="perfil.html" class="nav-item"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Meu Perfil</a>
    </nav>
    <div class="sidebar-footer"><button class="nav-item" id="btnLogout" style="width:100%;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.7);"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sair</button></div>
    <!-- estrutura principal da tela -->
  </aside>

  <main class="main-content">
    <div class="top-bar">
    <!-- estrutura principal da tela -->
      <div>
    <!-- estrutura principal da tela -->
        <h1 class="page-title">Lista de Compras</h1>
        <p class="page-subtitle">Itens sugeridos com base na sua dieta e ingredientes</p>
      </div>
      <div style="display:flex;gap:10px;">
    <!-- estrutura principal da tela -->
        <button class="btn-icon mobile-menu-btn" id="mobileMenuBtn"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        <button class="btn-secondary" id="btnCompartilhar" style="width:auto;padding:12px 20px;">📤 Compartilhar</button>
        <button class="btn-primary" id="btnAddItem" style="width:auto;padding:12px 20px;">+ Adicionar</button>
      </div>
    </div>

    <!-- PROGRESSO -->
    <div class="card" style="margin-bottom:20px;background:linear-gradient(135deg,var(--verde-escuro),var(--verde-medio));color:white;">
    <!-- estrutura principal da tela -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <!-- estrutura principal da tela -->
        <span style="font-weight:600;">Progresso das compras</span>
        <span id="progressoText" style="font-size:14px;opacity:0.8;">0 de 0</span>
      </div>
      <div style="background:rgba(255,255,255,0.2);border-radius:999px;height:8px;">
    <!-- estrutura principal da tela -->
        <div id="progressoBar" style="background:var(--laranja);height:8px;border-radius:999px;transition:width 0.3s;width:0%;"></div>
    <!-- estrutura principal da tela -->
      </div>
    </div>

    <!-- LISTA -->
    <div class="card" style="padding:0;overflow:hidden;">
    <!-- estrutura principal da tela -->
      <div id="listaBody" style="padding:8px 0;">
    <!-- estrutura principal da tela -->
        <div class="loading-placeholder">Carregando lista...</div>
    <!-- estrutura principal da tela -->
      </div>
    </div>

    <!-- ADD RÁPIDO -->
    <div class="card" style="margin-top:16px;">
    <!-- estrutura principal da tela -->
      <div style="display:flex;gap:12px;align-items:center;">
    <!-- estrutura principal da tela -->
        <input type="text" id="novoItemInput" placeholder="Adicionar item (Ex: Alface)" style="flex:1;padding:12px 16px;border:2px solid var(--creme-escuro);border-radius:10px;font-size:14px;">
        <input type="text" id="novoItemQtd" placeholder="Qtd" style="width:80px;padding:12px;border:2px solid var(--creme-escuro);border-radius:10px;font-size:14px;text-align:center;">
        <button class="btn-primary" id="btnAdicionarRapido" style="width:auto;padding:12px 20px;">Adicionar</button>
      </div>
    </div>
  </main>
</div>

<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script src="../js/lista-compras.js"></script>
</body>
</html>
